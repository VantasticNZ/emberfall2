<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World-Design Editor (game-agnostic · JSON in/out)</title>
<style>
  :root{ --bg:#0b0f0a; --panel:#11160f; --ink:#e8efe0; --dim:#9fb89a; --line:#243018; --acc:#ffd9a0;
    --early:#7fcf6a; --mid:#e0a23a; --late:#c873d8; --nogo:#c0392b; --music:#5a9fd6; --terr:#6fae4d;
    --warn:#e0a23a; --err:#e0574a; --ok:#7fcf6a; }
  *{ box-sizing:border-box; } html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink); font:13px/1.45 ui-monospace,Menlo,Consolas,monospace; overflow:hidden; }
  #top{ display:flex; align-items:center; gap:5px; padding:5px 9px; border-bottom:1px solid var(--line); background:#0e140b; flex-wrap:wrap; }
  #top b{ color:#fff6df; margin-right:6px; } .grp{ display:flex; gap:3px; align-items:center; padding:0 5px; border-right:1px solid var(--line); }
  button,select,input,textarea{ font:inherit; }
  button{ background:#1a2412; color:var(--ink); border:1px solid #2f3f1e; border-radius:5px; padding:3px 7px; cursor:pointer; }
  button:hover{ background:#243018; } button.on{ background:#3a5224; border-color:#5a7a34; color:#fff; }
  button.danger{ border-color:#5a2424; } button.danger:hover{ background:#3a1414; }
  input.search{ background:#0c110a; color:var(--ink); border:1px solid #2a3520; border-radius:5px; padding:3px 7px; width:130px; }
  #wrap{ display:flex; height:calc(100vh - 40px); }
  #cvwrap{ flex:1 1 auto; overflow:auto; position:relative; background:#080b07; }
  svg#cv{ display:block; } svg text{ user-select:none; }
  #side{ flex:0 0 350px; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; }
  #layers{ padding:7px 10px; border-bottom:1px solid var(--line); max-height:34%; overflow:auto; }
  #layers h4{ margin:5px 0 2px; font-size:11px; color:var(--acc); text-transform:uppercase; letter-spacing:.5px; }
  #layers label{ display:inline-flex; align-items:center; gap:4px; margin:1px 7px 1px 0; font-size:11px; cursor:pointer; }
  #editor{ padding:9px 12px; overflow:auto; flex:1 1 auto; }
  #editor h3{ margin:0 0 2px; font-size:15px; } #editor .sub{ color:var(--dim); font-size:11px; margin-bottom:6px; }
  #editor label.f{ display:block; margin:6px 0 1px; font-size:11px; color:var(--acc); }
  #editor input,#editor select,#editor textarea{ width:100%; background:#0c110a; color:var(--ink); border:1px solid #2a3520; border-radius:4px; padding:3px 6px; }
  #editor textarea{ resize:vertical; min-height:42px; } #editor .row{ display:flex; gap:6px; } #editor .row>*{ flex:1; }
  .hint{ color:var(--dim); } .pill{ display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; }
  .node{ cursor:pointer; } .node.sel circle,.node.sel polygon,.zone.sel rect,.note.sel circle,.qnode.sel rect{ stroke:#fff !important; stroke-width:3 !important; }
  .pathg{ cursor:pointer; } .pathg.sel path{ stroke-width:5 !important; } .qdot,.note,.bend{ cursor:pointer; }
  /* overlays */
  .overlay{ position:absolute; top:10px; background:#0e140bf2; border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-size:12px; max-width:300px; max-height:calc(100% - 24px); overflow:auto; box-shadow:0 4px 18px #000a; }
  #dash{ left:10px; } #warn{ right:10px; }
  .overlay h4{ margin:0 0 6px; color:var(--acc); font-size:13px; } .overlay table{ width:100%; border-collapse:collapse; }
  .overlay td{ padding:1px 4px; } .overlay td.n{ text-align:right; color:#fff; }
  .w-row{ padding:3px 5px; margin:3px 0; border-radius:5px; border-left:3px solid; } .w-err{ background:#2a14129a; border-color:var(--err); } .w-warn{ background:#2a24129a; border-color:var(--warn); } .w-ok{ color:var(--ok); }
  #hintbar{ position:absolute; left:10px; bottom:10px; background:#0e140bdd; border:1px solid var(--line); border-radius:6px; padding:4px 9px; font-size:11px; color:var(--dim); pointer-events:none; }
  .ck{ font-size:11px; } .ck .y{ color:var(--ok); } .ck .x{ color:var(--err); }
</style>
</head>
<body>
<div id="top">
  <b>WORLD EDITOR</b>
  <div class="grp">
    <button id="v_map" class="on">🗺 Map</button><button id="v_quests">🧩 Quests</button>
  </div>
  <div class="grp">
    <button id="m_select" class="on">▣ Select</button><button id="m_node">+ Node</button><button id="m_path">— Path</button><button id="m_zone">▭ Zone</button><button id="m_note">📌 Note</button>
  </div>
  <div class="grp">
    <button id="t_dash">📊 Dashboard</button><button id="t_warn">⚠ Warnings</button>
  </div>
  <div class="grp">
    <button id="z_out">−</button><button id="z_in">+</button><button id="z_lock" title="Lock scale (no auto-fit)">🔒 scale</button>
    <input class="search" id="search" placeholder="search place/quest/NPC…">
  </div>
  <div class="grp">
    <button id="io_new">New</button><button id="io_import">Import</button><button id="io_export">Export</button>
    <input id="file" type="file" accept="application/json" style="display:none">
  </div>
  <div class="grp" style="border:0"><span class="hint" id="counts"></span></div>
</div>
<div id="wrap">
  <div id="cvwrap"><svg id="cv"></svg><div id="hintbar"></div><div id="dash" class="overlay" style="display:none"></div><div id="warn" class="overlay" style="display:none"></div></div>
  <div id="side"><div id="layers"></div><div id="editor"></div></div>
</div>

/* ===================== completeness + dashboard + warnings ===================== */
function completeness(n){ const isSettle=['city','town','village'].includes(n.tier);
  const ck={ NPCs:(n.npcs||[]).length>0, quests:(n.quests||[]).length>0, terrain:!!n.terrain, music:isSettle?!!n.music:true, assets:!n.assets||(n.assets.gap||[]).length===0 };
  const vals=Object.values(ck); return { ck, pct:Math.round(100*vals.filter(Boolean).length/vals.length) }; }
function dashStats(){ const t={}; TIERS.forEach(x=>t[x]=0); let npc=0,quest=0,items=0,interiors=0,gaps=0; const itype={}, enemies={}, intByType={};
  for(const n of W.nodes){ t[n.tier]++; npc+=(n.npcs||[]).length; quest+=(n.quests||[]).length; items+=(n.items||[]).length;
    (n.items||[]).forEach(()=>{}); (n.enemies||[]).forEach(e=>enemies[e.type]=Math.max(enemies[e.type]||0,e.level||0));
    if(n.interiors)for(const k in n.interiors){ interiors+=n.interiors[k]; intByType[k]=(intByType[k]||0)+n.interiors[k]; }
    if(n.assets)gaps+=(n.assets.gap||[]).length; }
  const qtotal=(W.quests&&W.quests.length)||quest; const hours=Math.round((qtotal*0.45 + W.nodes.length*0.25)*10)/10;

function computeWarnings(){ const out=[]; const ref=new Set(); W.paths.forEach(p=>{ref.add(p.a);ref.add(p.b);});
  for(const n of W.nodes){ if(n.id!=='gh'&&!ref.has(n.id)) out.push({lvl:'err',msg:`“${n.label}” has NO route in/out (unreachable).`,sel:{t:'node',id:n.id}});
    const isSettle=['city','town','village'].includes(n.tier);
    if(isSettle&&!n.terrain) out.push({lvl:'warn',msg:`“${n.label}” has no TERRAIN assigned.`,sel:{t:'node',id:n.id}});
    if(isSettle&&!n.music) out.push({lvl:'warn',msg:`“${n.label}” has no MUSIC assigned.`,sel:{t:'node',id:n.id}});
    if(n.assets&&(n.assets.gap||[]).length) out.push({lvl:'warn',msg:`“${n.label}” has ${n.assets.gap.length} asset GAP(s): ${n.assets.gap.join(', ')}.`,sel:{t:'node',id:n.id}});
  }
  for(const p of W.paths){ if(!nodeById(p.a)||!nodeById(p.b)) out.push({lvl:'err',msg:`orphan path ${p.id} (missing endpoint).`,sel:{t:'path',id:p.id}}); }
  for(const q of (W.quests||[])){ if(q.node&&!nodeById(q.node)) out.push({lvl:'err',msg:`quest “${q.label}” has no valid home node (${q.node}).`,sel:null});
    for(const pr of (q.prereqs||[])){ if(!questById(pr)) out.push({lvl:'err',msg:`quest “${q.label}” needs missing prereq ${pr}.`,sel:null}); }
    if((q.prereqs||[]).includes(q.id)) out.push({lvl:'err',msg:`quest “${q.label}” is its own prereq (cycle / soft-lock).`,sel:null}); }
  // soft-lock heuristic: a place whose ONLY inbound path is gated by an item that the place ITSELF grants
  for(const n of W.nodes){ const ins=W.paths.filter(p=>p.b===n.id||p.a===n.id); if(!ins.length)continue;
    const allGated=ins.every(p=>p.gate); if(allGated){ const grants=(n.items||[]).join(' ').toLowerCase();
      if(ins.some(p=>p.gate&&grants&&p.gate.toLowerCase().split(/[^a-z0-9]+/).some(tok=>tok.length>3&&grants.includes(tok))))
        out.push({lvl:'warn',msg:`possible SOFT-LOCK: “${n.label}” is gated by an item it grants — check the key is earned earlier.`,sel:{t:'node',id:n.id}}); } }

function renderWarn(){ const w=document.getElementById('warn'); if(!show.warn){w.style.display='none';return;} w.style.display='block'; const ws=computeWarnings();

function render(){ if(view==='quests')return renderQuests(); fit(); while(cv.firstChild)cv.removeChild(cv.firstChild);

  const seen={};

    const dx=gx2px(b.gy)-gx2px(a.gy), dy=-(gx2px(b.gx)-gx2px(a.gx)); const L=Math.hypot(dx,dy)||1; const ox=(p.bends&&p.bends.length)?0:dx/L*off*11, oy=(p.bends&&p.bends.length)?0:dy/L*off*11;

    const d='M'+pts.map(q=>q.join(',')).join(' L');
    const g=el('g',{class:'pathg'+(sel&&sel.t==='path'&&sel.id===p.id?' sel':'')});
    el('path',{d,fill:'none',stroke:STAGECOL[p.stage]||'#888','stroke-width':2.4,opacity:.85,'stroke-dasharray':p.gate?'6 4':'0'},g);
    if(layers.pathlabels){ const m=ptAt(pts,0.5); const t=el('text',{x:m[0],y:m[1]-3,fill:STAGECOL[p.stage],'font-size':8,'text-anchor':'middle',stroke:'#080b07','stroke-width':2.5,'paint-order':'stroke'},g); t.textContent=p.via+(layers.gating&&p.gate?' · 🔒'+p.gate:''); }
    g.addEventListener('mousedown',ev=>{ if(mode==='select'){ ev.stopPropagation(); if(sel&&sel.t==='path'&&sel.id===p.id){ const gp=toGrid(ev); (p.bends=p.bends||[]).push({gx:Math.round(gp.gx*2)/2,gy:Math.round(gp.gy*2)/2}); render(); editPath(p); } else selectPath(p); } });
    if(sel&&sel.t==='path'&&sel.id===p.id)(p.bends||[]).forEach((bd,bi)=>{ const bg=el('g',{class:'bend'}); el('circle',{cx:gx2px(bd.gx),cy:gx2px(bd.gy),r:5,fill:'#fff',stroke:STAGECOL[p.stage],'stroke-width':2},bg); bg.addEventListener('mousedown',ev=>{ev.stopPropagation();drag={t:'bend',bd,start:toGrid(ev),ox:bd.gx,oy:bd.gy};}); });
    (p.dots||[]).forEach((dt,i)=>{ const ok=dt.type==='item'?layers.items:dt.type==='note'?1:layers.quests; if(!ok)return; const q=ptAt(pts,(i+1)/(p.dots.length+1)); const dg=el('g',{class:'qdot'}); el('circle',{cx:q[0],cy:q[1],r:4.5,fill:dt.type==='item'?'#ffd36a':dt.type==='note'?'#cfc0e0':'#9fe08a',stroke:'#080b07','stroke-width':1.5},dg); dg.addEventListener('mousedown',ev=>{if(mode==='select'){ev.stopPropagation();selectDot(p,dt);}}); });

  for(const n of W.nodes){ if(!layers[n.tier])continue; const r=Math.max(6,Math.sqrt(n.w*n.h)*0.26), px=gx2px(n.gx),py=gx2px(n.gy), col=TIERCOL[n.tier]||'#888';
    const g=el('g',{class:'node'+(sel&&sel.t==='node'&&sel.id===n.id?' sel':'')});
    if(n.tier==='dungeon'||n.tier==='secret') el('polygon',{points:`${px},${py-r} ${px+r},${py} ${px},${py+r} ${px-r},${py}`,fill:col,stroke:'#080b07','stroke-width':2},g);
    else el('circle',{cx:px,cy:py,r,fill:col,stroke:'#080b07','stroke-width':2},g);
    if(layers.complete){ const c=completeness(n); const cc=c.pct===100?'#7fcf6a':c.pct>=60?'#e0a23a':'#e0574a'; el('circle',{cx:px+r-2,cy:py-r+2,r:3.5,fill:cc,stroke:'#080b07','stroke-width':1},g); }
    const fs=n.tier==='city'?12:n.tier==='town'?10:8.5; const t=el('text',{x:px,y:py+r+fs,fill:'#eef3e6','font-size':fs,'font-weight':(n.tier==='city'||n.tier==='town')?'bold':'normal','text-anchor':'middle',stroke:'#080b07','stroke-width':3,'paint-order':'stroke'},g); t.textContent=n.label;

  if(draftZone){ el('rect',{x:gx2px(Math.min(draftZone.x0,draftZone.x1)),y:gx2px(Math.min(draftZone.y0,draftZone.y1)),width:Math.abs(draftZone.x1-draftZone.x0)*S,height:Math.abs(draftZone.y1-draftZone.y0)*S,fill:'#fff','fill-opacity':.1,stroke:'#fff','stroke-dasharray':'4 4'}); }

function ptAt(pts,f){ let tot=0,seg=[]; for(let i=0;i<pts.length-1;i++){const d=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]);seg.push(d);tot+=d;} let target=f*tot; for(let i=0;i<seg.length;i++){ if(target<=seg[i]){const t=seg[i]?target/seg[i]:0;return [pts[i][0]+(pts[i+1][0]-pts[i][0])*t,pts[i][1]+(pts[i+1][1]-pts[i][1])*t];} target-=seg[i]; } return pts[pts.length-1]; }

/* ===================== QUEST GRAPH ===================== */
function questDepth(q,memo){ if(memo[q.id]!=null)return memo[q.id]; memo[q.id]=0; const ds=(q.prereqs||[]).map(pr=>{const p=questById(pr);return p?1+questDepth(p,memo):0;}); memo[q.id]=ds.length?Math.max(...ds):0; return memo[q.id]; }
function renderQuests(){ const qs=W.quests||[]; const memo={}, byDepth={}; qs.forEach(q=>{const d=questDepth(q,memo);(byDepth[d]=byDepth[d]||[]).push(q);});
  const maxD=Math.max(0,...Object.keys(byDepth).map(Number)); const colW=210, rowH=54, px=O+ (maxD+1)*colW, py=O+ Math.max(...Object.values(byDepth).map(a=>a.length),1)*rowH+40;
  cv.setAttribute('width',px+40); cv.setAttribute('height',py); cv.setAttribute('viewBox',`0 0 ${px+40} ${py}`); while(cv.firstChild)cv.removeChild(cv.firstChild);
  el('text',{x:O,y:24,fill:'#fff6df','font-size':14,'font-weight':'bold'}).textContent='QUEST FLOW — prereq → quest → unlocks (critical path bold · sides dim)';
  const pos={}; for(const d in byDepth)byDepth[d].forEach((q,i)=>pos[q.id]={x:O+30+d*colW,y:O+30+i*rowH});
  for(const q of qs)for(const pr of (q.prereqs||[])){ const a=pos[pr],b=pos[q.id]; if(!a||!b)continue; const main=q.type==='main'&&questById(pr)&&questById(pr).type==='main';
    el('line',{x1:a.x+150,y1:a.y+13,x2:b.x,y2:b.y+13,stroke:main?'#e0c068':'#5a6b4a','stroke-width':main?2.5:1.4,opacity:.8,'marker-end':''}); el('polygon',{points:`${b.x},${b.y+13} ${b.x-7},${b.y+9} ${b.x-7},${b.y+17}`,fill:main?'#e0c068':'#5a6b4a'}); }
  for(const q of qs){ const p=pos[q.id]; const g=el('g',{class:'qnode'+(sel&&sel.t==='quest'&&sel.id===q.id?' sel':'')}); const c=q.type==='main'?'#e0c068':'#56988c';
    el('rect',{x:p.x,y:p.y,width:150,height:26,rx:5,fill:c,'fill-opacity':q.type==='main'?.95:.55,stroke:'#080b07','stroke-width':1.5},g);
    const t=el('text',{x:p.x+7,y:p.y+17,fill:'#0a0e08','font-size':9.5,'font-weight':q.type==='main'?'bold':'normal'},g); t.textContent=q.label.length>22?q.label.slice(0,21)+'…':q.label;
    g.style.cursor='pointer'; g.onclick=()=>selectQuest(q); }
  renderDash(); renderWarn(); document.getElementById('counts').textContent=`${qs.length} quests · critical path = ${qs.filter(q=>q.type==='main').length}`;
}

  bindInputs(n);
  document.getElementById('enemies').oninput=e=>{ n.enemies=e.target.value.split('\n').filter(x=>x.trim()).map(l=>{const[t,lv]=l.split(':');return{type:(t||'').trim(),level:+lv||1};}); render(); };
  document.getElementById('interiors').oninput=e=>{ n.interiors={}; e.target.value.split('\n').filter(x=>x.trim()).forEach(l=>{const[t,c]=l.split(':');n.interiors[(t||'').trim()]=+c||1;}); render(); };
  document.getElementById('ahave').oninput=e=>{ n.assets=n.assets||{have:[],gap:[]}; n.assets.have=e.target.value.split('\n').filter(x=>x.trim()); render(); };
  document.getElementById('agap').oninput=e=>{ n.assets=n.assets||{have:[],gap:[]}; n.assets.gap=e.target.value.split('\n').filter(x=>x.trim()); render(); };
  document.getElementById('del').onclick=()=>{ W.nodes=W.nodes.filter(x=>x!==n); W.paths=W.paths.filter(p=>p.a!==n.id&&p.b!==n.id); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function editPath(p){ const a=nodeById(p.a),b=nodeById(p.b);
  ed.innerHTML=`<h3>${a.label} ↔ ${b.label}</h3><div class="sub">path · id ${p.id} · ${(p.bends||[]).length} bend(s)</div>
   <label class=f>Traversal (via)</label><select data-k="via">${VIAS.map(v=>`<option ${v===p.via?'selected':''}>${v}</option>`).join('')}</select>
   <label class=f>Gate</label><input data-k="gate" value="${esc(p.gate||'')}">
   <label class=f>Stage</label><select data-k="stage">${STAGES.map(s=>`<option ${s===p.stage?'selected':''}>${s}</option>`).join('')}</select>
   <label class=f>Length</label><input data-k="len" value="${esc(p.len||'')}">
   <div class="hint" style="margin-top:6px">Tip: with the path selected, CLICK the line to add a bend point; drag the white handles to shape it.</div>
   <button id="straight" style="margin-top:4px">Straighten (clear bends)</button>
   <label class=f>Dots on this path</label><div id="dots"></div><button id="adddot" style="margin-top:4px">+ add dot</button>
   <div style="margin-top:9px"><button class="danger" id="del">Delete path</button></div>`;
  bindInputs(p); renderDots(p);
  document.getElementById('straight').onclick=()=>{ p.bends=[]; render(); editPath(p); };
  document.getElementById('adddot').onclick=()=>{ (p.dots=p.dots||[]).push({id:uid('d'),type:'quest',label:'new dot',detail:''}); render(); renderDots(p); };
  document.getElementById('del').onclick=()=>{ W.paths=W.paths.filter(x=>x!==p); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function renderDots(p){ const box=document.getElementById('dots'); box.innerHTML=''; (p.dots||[]).forEach(d=>{ const div=document.createElement('div'); div.style.cssText='border:1px solid #2a3520;border-radius:5px;padding:5px;margin:4px 0';
  div.innerHTML=`<div class=row><select data-dk="type"><option ${d.type==='quest'?'selected':''}>quest</option><option ${d.type==='item'?'selected':''}>item</option><option ${d.type==='note'?'selected':''}>note</option></select><input data-dk="label" value="${esc(d.label)}"></div><textarea data-dk="detail" style="margin-top:3px">${esc(d.detail||'')}</textarea><button class="danger" data-del="1" style="margin-top:3px;padding:2px 6px">remove</button>`;
  div.querySelectorAll('[data-dk]').forEach(i=>i.oninput=()=>{d[i.dataset.dk]=i.value;render();}); div.querySelector('[data-del]').onclick=()=>{p.dots=p.dots.filter(x=>x!==d);render();renderDots(p);}; box.appendChild(div); }); }
function editZone(z){ const idx=W.zones.indexOf(z); ed.innerHTML=`<h3>Zone</h3><div class="sub">${z.kind} · id ${z.id} · layer ${idx+1}/${W.zones.length}</div>
   <label class=f>Kind</label><select data-k="kind">${ZONEKINDS.map(k=>`<option ${k===z.kind?'selected':''}>${k}</option>`).join('')}</select>
   <label class=f>Label</label><input data-k="label" value="${esc(z.label||'')}"><label class=f>Colour</label><input data-k="color" value="${esc(z.color||ZONECOL[z.kind])}">
   <label class=f><input type=checkbox data-k="fade" ${z.fade?'checked':''}> fade / overlap halo</label>
   <div class="row"><div><label class=f>gx</label><input type=number step=0.5 data-k="gx" value="${z.gx}"></div><div><label class=f>gy</label><input type=number step=0.5 data-k="gy" value="${z.gy}"></div><div><label class=f>gw</label><input type=number step=0.5 data-k="gw" value="${z.gw}"></div><div><label class=f>gh</label><input type=number step=0.5 data-k="gh" value="${z.gh}"></div></div>
   <div class="row" style="margin-top:7px"><button id="back">⤓ send to back</button><button id="front">⤒ bring to front</button></div>
   <div style="margin-top:9px"><button class="danger" id="del">Delete zone</button></div>`;
  ed.querySelectorAll('[data-k]').forEach(i=>i.oninput=()=>{ z[i.dataset.k]=i.type==='checkbox'?i.checked:(i.type==='number'?+i.value:i.value); render(); });
  document.getElementById('back').onclick=()=>{ W.zones=W.zones.filter(x=>x!==z); W.zones.unshift(z); render(); editZone(z); };
  document.getElementById('front').onclick=()=>{ W.zones=W.zones.filter(x=>x!==z); W.zones.push(z); render(); editZone(z); };
  document.getElementById('del').onclick=()=>{ W.zones=W.zones.filter(x=>x!==z); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function editNote(nt){ ed.innerHTML=`<h3>📌 Note</h3><div class="sub">id ${nt.id} · @ (${nt.gx.toFixed(1)},${nt.gy.toFixed(1)})</div><label class=f>Van’s note (Claude Code reads this back)</label><textarea data-k="text" style="min-height:120px">${esc(nt.text||'')}</textarea><div style="margin-top:9px"><button class="danger" id="del">Delete note</button></div>`;
  ed.querySelector('[data-k]').oninput=e=>{nt.text=e.target.value;}; document.getElementById('del').onclick=()=>{ W.notes=W.notes.filter(x=>x!==nt); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; }; }
function editQuest(q){ const others=(W.quests||[]).filter(x=>x.id!==q.id);
  ed.innerHTML=`<h3>${q.label}</h3><div class="sub">quest · id ${q.id} · ${q.type}</div>
   <label class=f>Label</label><input data-k="label" value="${esc(q.label)}">
   <div class="row"><div><label class=f>Type</label><select data-k="type"><option ${q.type==='main'?'selected':''}>main</option><option ${q.type==='side'?'selected':''}>side</option></select></div>
   <div><label class=f>Home node</label><select data-k="node"><option value="">—</option>${W.nodes.map(n=>`<option value="${n.id}" ${n.id===q.node?'selected':''}>${n.label}</option>`).join('')}</select></div></div>
   <label class=f>Prereqs (the quests that must come first)</label>
   <div id="pre">${others.map(o=>`<label style="display:block"><input type=checkbox data-pre="${o.id}" ${(q.prereqs||[]).includes(o.id)?'checked':''}> ${esc(o.label)}</label>`).join('')}</div>
   <div style="margin-top:9px"><button class="danger" id="del">Delete quest</button></div>`;
  ed.querySelectorAll('[data-k]').forEach(i=>i.oninput=()=>{q[i.dataset.k]=i.value;render();});
  ed.querySelectorAll('[data-pre]').forEach(i=>i.onchange=()=>{ q.prereqs=q.prereqs||[]; const id=i.dataset.pre; if(i.checked){if(!q.prereqs.includes(id))q.prereqs.push(id);}else q.prereqs=q.prereqs.filter(x=>x!==id); render(); });
  document.getElementById('del').onclick=()=>{ W.quests=W.quests.filter(x=>x!==q); W.quests.forEach(x=>x.prereqs=(x.prereqs||[]).filter(p=>p!==q.id)); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===================== add / drag / events ===================== */
function addNode(g){ const n={id:uid('n'),label:'New Place',tier:'village',region:'',w:30,h:24,gx:g.gx,gy:g.gy,terrain:'',music:'',unlock:'',interiors:{},enemies:[],assets:{have:[],gap:[]},npcs:[],quests:[],items:[]}; W.nodes.push(n); selectNode(n); }
function addPath(a,b){ const p={id:uid('p'),a,b,via:'walk',gate:'',stage:'early',len:'',bends:[],dots:[]}; W.paths.push(p); selectPath(p); }
function addNote(g){ const text=prompt('Note (Van’s suggestion / change):'); if(text==null)return; const nt={id:uid('n'),gx:g.gx,gy:g.gy,text}; W.notes.push(nt); selectNote(nt); render(); }
cv.addEventListener('mousedown',e=>{ if(view==='quests')return; const g=toGrid(e); if(mode==='node')addNode(g); else if(mode==='note')addNote(g); else if(mode==='zone')draftZone={x0:g.gx,y0:g.gy,x1:g.gx,y1:g.gy}; else if(mode==='select'){sel=null;ed.innerHTML='<div class=hint>nothing selected.</div>';render();} });
window.addEventListener('mousemove',e=>{ if(drag){ const g=toGrid(e); const o=drag.t==='node'?drag.n:drag.t==='zone'?drag.z:drag.t==='bend'?drag.bd:drag.nt; o.gx=Math.round((drag.ox+(g.gx-drag.start.gx))*2)/2; o.gy=Math.round((drag.oy+(g.gy-drag.start.gy))*2)/2; render(); } else if(draftZone){ const g=toGrid(e); draftZone.x1=g.gx; draftZone.y1=g.gy; render(); } });
window.addEventListener('mouseup',()=>{ if(drag)drag=null; if(draftZone){ const z={id:uid('z'),kind:'terrain',label:'New Zone',gx:Math.min(draftZone.x0,draftZone.x1),gy:Math.min(draftZone.y0,draftZone.y1),gw:Math.abs(draftZone.x1-draftZone.x0)||2,gh:Math.abs(draftZone.y1-draftZone.y0)||2,color:ZONECOL.terrain,fade:true}; if(z.gw>0.3&&z.gh>0.3){W.zones.push(z);selectZone(z);} draftZone=null; render(); } });
window.addEventListener('keydown',e=>{ if((e.key==='Delete')&&sel&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){ const f={node:()=>{W.nodes=W.nodes.filter(x=>x.id!==sel.id);W.paths=W.paths.filter(p=>nodeById(p.a)&&nodeById(p.b));},path:()=>W.paths=W.paths.filter(x=>x.id!==sel.id),zone:()=>W.zones=W.zones.filter(x=>x.id!==sel.id),note:()=>W.notes=W.notes.filter(x=>x.id!==sel.id),quest:()=>W.quests=W.quests.filter(x=>x.id!==sel.id)}[sel.t]; f&&f(); sel=null; render(); } });

/* ===================== toolbar / modes / view / IO / search / zoom ===================== */
function setMode(m){ mode=m; pathStart=null; ['select','node','path','zone','note'].forEach(x=>document.getElementById('m_'+x).classList.toggle('on',x===m)); document.getElementById('hintbar').textContent={select:'Drag nodes/zones/bends · click a place/path/quest to edit · Delete removes',node:'Click the canvas to add a place',path:'Click node A then B to link',zone:'Drag a rectangle',note:'Click to drop a note'}[m]; }
['select','node','path','zone','note'].forEach(m=>document.getElementById('m_'+m).onclick=()=>setMode(m));
function setView(){ document.getElementById('v_map').classList.toggle('on',view==='map'); document.getElementById('v_quests').classList.toggle('on',view==='quests'); render(); }
document.getElementById('v_map').onclick=()=>{view='map';setView();}; document.getElementById('v_quests').onclick=()=>{view='quests';setView();};
document.getElementById('t_dash').onclick=()=>{show.dash=!show.dash;document.getElementById('t_dash').classList.toggle('on',show.dash);renderDash();};
document.getElementById('t_warn').onclick=()=>{show.warn=!show.warn;document.getElementById('t_warn').classList.toggle('on',show.warn);renderWarn();};
document.getElementById('z_in').onclick=()=>{S=Math.min(80,S*1.18);render();}; document.getElementById('z_out').onclick=()=>{S=Math.max(16,S/1.18);render();};
document.getElementById('z_lock').onclick=()=>{lockScale=!lockScale;document.getElementById('z_lock').classList.toggle('on',lockScale);};
document.getElementById('search').onkeydown=e=>{ if(e.key!=='Enter')return; const q=e.target.value.toLowerCase().trim(); if(!q)return;
  let hit=W.nodes.find(n=>n.label.toLowerCase().includes(q)) || W.nodes.find(n=>(n.npcs||[]).some(x=>x.toLowerCase().includes(q))||(n.quests||[]).some(x=>x.toLowerCase().includes(q)));
  let qq=(W.quests||[]).find(x=>x.label.toLowerCase().includes(q));
  if(hit){ view='map'; setView(); selectNode(hit); const wrap=document.getElementById('cvwrap'); wrap.scrollTo({left:gx2px(hit.gx)-wrap.clientWidth/2,top:gx2px(hit.gy)-wrap.clientHeight/2,behavior:'smooth'}); }
  else if(qq){ view='quests'; setView(); selectQuest(qq); }
  else document.getElementById('hintbar').textContent='no match for “'+q+'”'; };
document.getElementById('io_export').onclick=()=>{ const blob=new Blob([JSON.stringify(W,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(W.meta.name||'world').replace(/\W+/g,'-').toLowerCase()+'.world.json'; a.click(); };
document.getElementById('io_import').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=()=>{ try{ const j=JSON.parse(rd.result); if(!j.nodes)throw 0; W=j; ['zones','notes','paths','quests'].forEach(k=>W[k]=W[k]||[]); W.meta=W.meta||{grid:24}; sel=null; render(); ed.innerHTML='<div class=hint>imported '+(W.meta.name||'world')+'.</div>'; }catch(err){ alert('Not a valid world JSON.'); } }; rd.readAsText(f); e.target.value=''; };
document.getElementById('io_new').onclick=()=>{ if(!confirm('Start a blank world? (export first to keep this one)'))return; W={meta:{name:'New World',grid:24,tileSize:32},nodes:[],paths:[],zones:[],quests:[],notes:[]}; sel=null; render(); ed.innerHTML='<div class=hint>blank world.</div>'; };
function buildLayers(){ const L=document.getElementById('layers'); const grp=(title,keys)=>`<h4>${title}</h4>${keys.map(([k,lab,c])=>`<label><input type=checkbox data-l="${k}" ${layers[k]?'checked':''}> <span style="color:${c||'#cdd8c4'}">${lab}</span></label>`).join('')}`;
  L.innerHTML=grp('Places (tier)',TIERS.map(t=>[t,t,TIERCOL[t]]))
    +grp('Paths (stage)',[['early','early',STAGECOL.early],['mid','mid',STAGECOL.mid],['late','late',STAGECOL.late],['pathlabels','labels'],['gating','gate labels']])
    +grp('Zones',[['terrain','terrain',ZONECOL.terrain],['music','music',ZONECOL.music],['nogo','no-go',ZONECOL.nogo]])
    +grp('Overlays',[['quests','quests','#9fe08a'],['items','items','#ffd36a'],['npcs','NPC counts'],['complete','completeness'],['notes','notes','#ffe08a'],['grid','grid']]);
  L.querySelectorAll('[data-l]').forEach(c=>c.onchange=()=>{layers[c.dataset.l]=c.checked;render();}); }
buildLayers(); setMode('select'); render();
</script>
</body>
