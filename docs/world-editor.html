<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World-Design Editor (game-agnostic · JSON in/out)</title>
<style>
  :root{ --bg:#0b0f0a; --panel:#11160f; --ink:#e8efe0; --dim:#9fb89a; --line:#243018; --acc:#ffd9a0;
    --early:#7fcf6a; --mid:#e0a23a; --late:#c873d8; --nogo:#c0392b; --music:#5a9fd6; --terr:#6fae4d; }
  *{ box-sizing:border-box; } html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--ink); font:13px/1.45 ui-monospace,Menlo,Consolas,monospace; overflow:hidden; }
  #top{ display:flex; align-items:center; gap:6px; padding:6px 10px; border-bottom:1px solid var(--line); background:#0e140b; flex-wrap:wrap; }
  #top b{ color:#fff6df; margin-right:8px; } .grp{ display:flex; gap:3px; align-items:center; padding:0 6px; border-right:1px solid var(--line); }
  button,select,input,textarea{ font:inherit; }
  button{ background:#1a2412; color:var(--ink); border:1px solid #2f3f1e; border-radius:5px; padding:4px 8px; cursor:pointer; }
  button:hover{ background:#243018; } button.on{ background:#3a5224; border-color:#5a7a34; color:#fff; }
  button.danger{ border-color:#5a2424; } button.danger:hover{ background:#3a1414; }
  #wrap{ display:flex; height:calc(100vh - 42px); }
  #cvwrap{ flex:1 1 auto; overflow:auto; position:relative; background:#080b07; }
  svg#cv{ display:block; } svg text{ user-select:none; }
  #side{ flex:0 0 340px; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; }
  #layers{ padding:8px 10px; border-bottom:1px solid var(--line); max-height:42%; overflow:auto; }
  #layers h4{ margin:6px 0 3px; font-size:11px; color:var(--acc); text-transform:uppercase; letter-spacing:.5px; }
  #layers label{ display:inline-flex; align-items:center; gap:4px; margin:1px 8px 1px 0; font-size:11px; cursor:pointer; }
  #editor{ padding:10px 12px; overflow:auto; flex:1 1 auto; }
  #editor h3{ margin:0 0 2px; font-size:15px; } #editor .sub{ color:var(--dim); font-size:11px; margin-bottom:8px; }
  #editor label.f{ display:block; margin:7px 0 1px; font-size:11px; color:var(--acc); }
  #editor input,#editor select,#editor textarea{ width:100%; background:#0c110a; color:var(--ink); border:1px solid #2a3520; border-radius:4px; padding:4px 6px; }
  #editor textarea{ resize:vertical; min-height:46px; }
  #editor .row{ display:flex; gap:6px; } #editor .row>*{ flex:1; }
  #editor .hint{ color:var(--dim); } .pill{ display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; }
  .node{ cursor:pointer; } .node.sel circle,.node.sel polygon,.zone.sel rect,.note.sel circle{ stroke:#fff !important; stroke-width:3 !important; }
  .pathg{ cursor:pointer; } .pathg.sel line{ stroke-width:5 !important; }
  .qdot,.note{ cursor:pointer; }
  #hintbar{ position:absolute; left:8px; bottom:8px; background:#0e140bdd; border:1px solid var(--line); border-radius:6px; padding:5px 9px; font-size:11px; color:var(--dim); pointer-events:none; }
</style>
</head>
<body>
<div id="top">
  <b>WORLD EDITOR</b>
  <div class="grp">
    <button id="m_select" class="on" title="Select / drag nodes + zones">▣ Select</button>
    <button id="m_node" title="Click canvas to add a place">+ Node</button>
    <button id="m_path" title="Click two nodes to link them">— Path</button>
    <button id="m_zone" title="Drag a rectangle (zone)">▭ Zone</button>
    <button id="m_note" title="Click to drop a note pin">📌 Note</button>
  </div>
  <div class="grp">
    <button id="io_new">New</button>
    <button id="io_import">Import JSON</button>
    <button id="io_export">Export JSON</button>
    <input id="file" type="file" accept="application/json" style="display:none">
  </div>
  <div class="grp" style="border:0"><span class="hint" id="counts"></span></div>
</div>
<div id="wrap">
  <div id="cvwrap"><svg id="cv"></svg><div id="hintbar"></div></div>
  <div id="side">
    <div id="layers"></div>
    <div id="editor"></div>
  </div>
</div>

/* ===================== state ===================== */
let W=clone(DEFAULT_WORLD), mode='select', sel=null, drag=null, pathStart=null, draftZone=null;
const layers={ city:1,town:1,village:1,dungeon:1,secret:1,landmark:1, early:1,mid:1,late:1, pathlabels:1, gating:1, terrain:1,music:1,nogo:1, quests:1,items:1,npcs:1, notes:1, grid:1 };
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function uid(p){ return p+Math.random().toString(36).slice(2,7); }

const cv=document.getElementById('cv'), SVGNS='http://www.w3.org/2000/svg';
let GRID=W.meta.grid, O=44, S=40; // px per grid unit
function fit(){ GRID=W.meta.grid; const px=GRID*S+O*2; cv.setAttribute('width',px); cv.setAttribute('height',px); cv.setAttribute('viewBox',`0 0 ${px} ${px}`); }
const gx2px=g=>O+g*S;
function toGrid(e){ const pt=cv.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const l=pt.matrixTransform(cv.getScreenCTM().inverse()); return {gx:(l.x-O)/S,gy:(l.y-O)/S}; }
function el(n,a,parent){ const e=document.createElementNS(SVGNS,n); for(const k in a)e.setAttribute(k,a[k]); (parent||cv).appendChild(e); return e; }
const nodeById=id=>W.nodes.find(n=>n.id===id);

/* ===================== render ===================== */
function render(){
  fit(); while(cv.firstChild) cv.removeChild(cv.firstChild);
  // zones (terrain/music/nogo) — fade = a lighter halo behind
  for(const z of W.zones){ if(!layers[z.kind])continue; const col=z.color||ZONECOL[z.kind];
    if(z.fade) el('rect',{x:gx2px(z.gx)-6,y:gx2px(z.gy)-6,width:z.gw*S+12,height:z.gh*S+12,rx:16,fill:col,opacity:.06});
    const g=el('g',{class:'zone'+(sel&&sel.t==='zone'&&sel.id===z.id?' sel':'')});
    const r=el('rect',{x:gx2px(z.gx),y:gx2px(z.gy),width:z.gw*S,height:z.gh*S,rx:10,fill:col,'fill-opacity':z.kind==='nogo'?.18:.13,stroke:col,'stroke-opacity':.55,'stroke-width':z.kind==='nogo'?2:1.2,'stroke-dasharray':z.kind==='nogo'?'3 4':z.kind==='music'?'8 5':'0'},g);
    const t=el('text',{x:gx2px(z.gx)+6,y:gx2px(z.gy)+15,fill:col,'font-size':11,'font-weight':'bold',opacity:.85},g); t.textContent=(z.kind==='music'?'♪ ':z.kind==='nogo'?'⛔ ':'')+ (z.label||z.kind);
    g.addEventListener('mousedown',ev=>{ if(mode==='select'){ ev.stopPropagation(); selectZone(z); drag={t:'zone',z,start:toGrid(ev),ox:z.gx,oy:z.gy}; }});
  }
  // grid
  if(layers.grid) for(let i=0;i<=GRID;i++){ const m=i%4===0; el('line',{x1:gx2px(i),y1:gx2px(0),x2:gx2px(i),y2:gx2px(GRID),stroke:'#1d2718','stroke-width':m?1:.5,opacity:m?.7:.35}); el('line',{x1:gx2px(0),y1:gx2px(i),x2:gx2px(GRID),y2:gx2px(i),stroke:'#1d2718','stroke-width':m?1:.5,opacity:m?.7:.35}); if(m){const t=el('text',{x:gx2px(i),y:gx2px(0)-5,fill:'#4b5b3f','font-size':8,'text-anchor':'middle'});t.textContent=i;} }
  // paths
  const seen={};
  for(const p of W.paths){ if(!layers[p.stage])continue; const a=nodeById(p.a),b=nodeById(p.b); if(!a||!b)continue;
    const k=[p.a,p.b].sort().join('|'); const off=(seen[k]=(seen[k]||0)+1)-1;
    const dx=gx2px(b.gy)-gx2px(a.gy), dy=-(gx2px(b.gx)-gx2px(a.gx)); const L=Math.hypot(dx,dy)||1; const ox=dx/L*off*11, oy=dy/L*off*11;
    const x1=gx2px(a.gx)+ox,y1=gx2px(a.gy)+oy,x2=gx2px(b.gx)+ox,y2=gx2px(b.gy)+oy;
    const g=el('g',{class:'pathg'+(sel&&sel.t==='path'&&sel.id===p.id?' sel':'')});
    el('line',{x1,y1,x2,y2,stroke:STAGECOL[p.stage]||'#888','stroke-width':2.4,opacity:.85,'stroke-dasharray':p.gate?'6 4':'0'},g);
    if(layers.pathlabels){ const t=el('text',{x:(x1+x2)/2,y:(y1+y2)/2-3,fill:STAGECOL[p.stage],'font-size':8,'text-anchor':'middle',stroke:'#080b07','stroke-width':2.5,'paint-order':'stroke'},g); t.textContent=p.via+(layers.gating&&p.gate?' · 🔒'+p.gate:''); }
    g.addEventListener('mousedown',ev=>{ if(mode==='select'){ev.stopPropagation();selectPath(p);} });
    // quest/item/note dots on the path
    (p.dots||[]).forEach((d,i)=>{ const layerOk = d.type==='item'?layers.items : d.type==='note'?1 : layers.quests; if(!layerOk)return;
      const f=(i+1)/(p.dots.length+1), qx=x1+(x2-x1)*f, qy=y1+(y2-y1)*f;
      const dg=el('g',{class:'qdot'}); el('circle',{cx:qx,cy:qy,r:4.5,fill:d.type==='item'?'#ffd36a':d.type==='note'?'#cfc0e0':'#9fe08a',stroke:'#080b07','stroke-width':1.5},dg);
      dg.addEventListener('mousedown',ev=>{ if(mode==='select'){ev.stopPropagation();selectDot(p,d);} });
    });
  }
  // path-draw helper line
  if(mode==='path'&&pathStart){ const a=nodeById(pathStart); el('circle',{cx:gx2px(a.gx),cy:gx2px(a.gy),r:Math.max(7,Math.sqrt(a.w*a.h)*0.26)+4,fill:'none',stroke:'#fff','stroke-dasharray':'3 3'}); }
  // nodes (true relative scale)
  for(const n of W.nodes){ if(!layers[n.tier])continue; const r=Math.max(6,Math.sqrt(n.w*n.h)*0.26), px=gx2px(n.gx),py=gx2px(n.gy);
    const col=TIERCOL[n.tier]||REGCOL[n.region]||'#888';
    const g=el('g',{class:'node'+(sel&&sel.t==='node'&&sel.id===n.id?' sel':'')});
    if(n.tier==='dungeon'||n.tier==='secret') el('polygon',{points:`${px},${py-r} ${px+r},${py} ${px},${py+r} ${px-r},${py}`,fill:col,stroke:'#080b07','stroke-width':2},g);
    else el('circle',{cx:px,cy:py,r,fill:col,stroke:'#080b07','stroke-width':2},g);
    const fs=n.tier==='city'?12:n.tier==='town'?10:8.5; const t=el('text',{x:px,y:py+r+fs,fill:'#eef3e6','font-size':fs,'font-weight':(n.tier==='city'||n.tier==='town')?'bold':'normal','text-anchor':'middle',stroke:'#080b07','stroke-width':3,'paint-order':'stroke'},g); t.textContent=n.label;
    const st=el('text',{x:px,y:py+r+fs+10,fill:'#9fb89a','font-size':7.5,'text-anchor':'middle',stroke:'#080b07','stroke-width':2.5,'paint-order':'stroke'},g); st.textContent=n.w+'×'+n.h+(layers.npcs&&n.npcs.length?'  ·  '+n.npcs.length+' NPC':'');
    g.addEventListener('mousedown',ev=>{ ev.stopPropagation();
      if(mode==='select'){ selectNode(n); drag={t:'node',n,start:toGrid(ev),ox:n.gx,oy:n.gy}; }
      else if(mode==='path'){ if(!pathStart){pathStart=n.id;render();} else if(pathStart!==n.id){ addPath(pathStart,n.id); pathStart=null; } }
    });
  }
  // notes
  if(layers.notes) for(const nt of W.notes){ const g=el('g',{class:'note'+(sel&&sel.t==='note'&&sel.id===nt.id?' sel':'')});
    el('circle',{cx:gx2px(nt.gx),cy:gx2px(nt.gy),r:8,fill:'#ffe08a',stroke:'#7a5a10','stroke-width':2},g);
    const t=el('text',{x:gx2px(nt.gx),y:gx2px(nt.gy)+4,'text-anchor':'middle','font-size':11,fill:'#3a2a00'},g); t.textContent='📌';
    g.addEventListener('mousedown',ev=>{ if(mode==='select'){ev.stopPropagation();selectNote(nt);drag={t:'note',nt,start:toGrid(ev),ox:nt.gx,oy:nt.gy};} });
  }
  // draft zone preview
  if(draftZone){ el('rect',{x:gx2px(Math.min(draftZone.x0,draftZone.x1)),y:gx2px(Math.min(draftZone.y0,draftZone.y1)),width:Math.abs(draftZone.x1-draftZone.x0)*S,height:Math.abs(draftZone.y1-draftZone.y0)*S,fill:'#fff','fill-opacity':.1,stroke:'#fff','stroke-dasharray':'4 4'}); }
  document.getElementById('counts').textContent=`${W.nodes.length} nodes · ${W.paths.length} paths · ${W.zones.length} zones · ${W.notes.length} notes`;
}

/* ===================== selection + editor panel ===================== */
function selectNode(n){ sel={t:'node',id:n.id}; render(); editNode(n); }
function selectPath(p){ sel={t:'path',id:p.id}; render(); editPath(p); }
function selectZone(z){ sel={t:'zone',id:z.id}; render(); editZone(z); }
function selectNote(nt){ sel={t:'note',id:nt.id}; render(); editNote(nt); }
function selectDot(p,d){ sel={t:'path',id:p.id}; render(); editDot(p,d); }
const ed=document.getElementById('editor');
const linesArea=(label,val,on)=>`<label class=f>${label}</label><textarea data-k="${on}">${(val||[]).join('\n')}</textarea>`;
function bindInputs(obj,after){ ed.querySelectorAll('[data-k]').forEach(inp=>{ inp.oninput=()=>{ const k=inp.dataset.k; const v=inp.tagName==='TEXTAREA'&&inp.dataset.arr?inp.value.split('\n').filter(x=>x.trim()!==''):(inp.type==='number'?+inp.value:inp.value); obj[k]=v; render(); after&&after(); }; }); }
function editNode(n){
  ed.innerHTML=`<h3 style="color:${TIERCOL[n.tier]}">${n.label}</h3><div class="sub">place · id ${n.id}</div>
   <label class=f>Name</label><input data-k="label" value="${esc(n.label)}">
   <div class="row"><div><label class=f>Tier</label><select data-k="tier">${TIERS.map(t=>`<option ${t===n.tier?'selected':''}>${t}</option>`).join('')}</select></div>
   <div><label class=f>Region</label><input data-k="region" value="${esc(n.region||'')}"></div></div>
   <div class="row"><div><label class=f>W (tiles)</label><input type=number data-k="w" value="${n.w}"></div><div><label class=f>H</label><input type=number data-k="h" value="${n.h}"></div></div>
   <label class=f>Unlock — when/how accessible</label><textarea data-k="unlock">${esc(n.unlock||'')}</textarea>
   <label class=f>NPCs (one per line)</label><textarea data-k="npcs" data-arr=1>${(n.npcs||[]).map(esc).join('\n')}</textarea>
   <label class=f>Quests / events</label><textarea data-k="quests" data-arr=1>${(n.quests||[]).map(esc).join('\n')}</textarea>
   <label class=f>Items / loot</label><textarea data-k="items" data-arr=1>${(n.items||[]).map(esc).join('\n')}</textarea>
   <label class=f>Buildings (⇲ = enterable)</label><textarea data-k="buildings" data-arr=1>${(n.buildings||[]).map(esc).join('\n')}</textarea>
   <div style="margin-top:10px"><button class="danger" id="del">Delete place</button></div>`;
  bindInputs(n);
  document.getElementById('del').onclick=()=>{ W.nodes=W.nodes.filter(x=>x!==n); W.paths=W.paths.filter(p=>p.a!==n.id&&p.b!==n.id); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function editPath(p){ const a=nodeById(p.a),b=nodeById(p.b);
  ed.innerHTML=`<h3>${a.label} ↔ ${b.label}</h3><div class="sub">path · id ${p.id}</div>
   <label class=f>Traversal (via)</label><select data-k="via">${VIAS.map(v=>`<option ${v===p.via?'selected':''}>${v}</option>`).join('')}</select>
   <label class=f>Gate (ability / story)</label><input data-k="gate" value="${esc(p.gate||'')}">
   <label class=f>Progression stage</label><select data-k="stage">${STAGES.map(s=>`<option ${s===p.stage?'selected':''}>${s}</option>`).join('')}</select>
   <label class=f>Length (min/avg/max)</label><input data-k="len" value="${esc(p.len||'')}">
   <label class=f>Quest / item / note dots on this path</label><div id="dots"></div>
   <button id="adddot" style="margin-top:4px">+ add dot</button>
   <div style="margin-top:10px"><button class="danger" id="del">Delete path</button></div>`;
  bindInputs(p); renderDots(p);
  document.getElementById('adddot').onclick=()=>{ (p.dots=p.dots||[]).push({id:uid('d'),type:'quest',label:'new dot',detail:''}); render(); renderDots(p); };
  document.getElementById('del').onclick=()=>{ W.paths=W.paths.filter(x=>x!==p); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function renderDots(p){ const box=document.getElementById('dots'); box.innerHTML='';
  (p.dots||[]).forEach(d=>{ const div=document.createElement('div'); div.style.cssText='border:1px solid #2a3520;border-radius:5px;padding:5px;margin:4px 0';
    div.innerHTML=`<div class=row><select data-dk="type"><option ${d.type==='quest'?'selected':''}>quest</option><option ${d.type==='item'?'selected':''}>item</option><option ${d.type==='note'?'selected':''}>note</option></select><input data-dk="label" value="${esc(d.label)}"></div><textarea data-dk="detail" style="margin-top:3px">${esc(d.detail||'')}</textarea><button class="danger" data-del="1" style="margin-top:3px;padding:2px 6px">remove</button>`;
    div.querySelectorAll('[data-dk]').forEach(i=>i.oninput=()=>{ d[i.dataset.dk]=i.value; render(); });
    div.querySelector('[data-del]').onclick=()=>{ p.dots=p.dots.filter(x=>x!==d); render(); renderDots(p); };
    box.appendChild(div); });
}
function editDot(p,d){ editPath(p); }
function editZone(z){ ed.innerHTML=`<h3>Zone</h3><div class="sub">${z.kind} · id ${z.id}</div>
   <label class=f>Kind</label><select data-k="kind">${ZONEKINDS.map(k=>`<option ${k===z.kind?'selected':''}>${k}</option>`).join('')}</select>
   <label class=f>Label</label><input data-k="label" value="${esc(z.label||'')}">
   <label class=f>Colour</label><input data-k="color" value="${esc(z.color||ZONECOL[z.kind])}">
   <label class=f><input type=checkbox data-k="fade" ${z.fade?'checked':''}> fade / overlap halo</label>
   <div class="row"><div><label class=f>gx</label><input type=number step=0.5 data-k="gx" value="${z.gx}"></div><div><label class=f>gy</label><input type=number step=0.5 data-k="gy" value="${z.gy}"></div></div>
   <div class="row"><div><label class=f>gw</label><input type=number step=0.5 data-k="gw" value="${z.gw}"></div><div><label class=f>gh</label><input type=number step=0.5 data-k="gh" value="${z.gh}"></div></div>
   <div style="margin-top:10px"><button class="danger" id="del">Delete zone</button></div>`;
  ed.querySelectorAll('[data-k]').forEach(i=>i.oninput=()=>{ z[i.dataset.k]=i.type==='checkbox'?i.checked:(i.type==='number'?+i.value:i.value); render(); });
  document.getElementById('del').onclick=()=>{ W.zones=W.zones.filter(x=>x!==z); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function editNote(nt){ ed.innerHTML=`<h3>📌 Note</h3><div class="sub">id ${nt.id} · @ (${nt.gx.toFixed(1)},${nt.gy.toFixed(1)})</div>
   <label class=f>Van’s note (Claude Code reads this back)</label><textarea data-k="text" style="min-height:120px">${esc(nt.text||'')}</textarea>
   <div style="margin-top:10px"><button class="danger" id="del">Delete note</button></div>`;
  ed.querySelector('[data-k]').oninput=e=>{ nt.text=e.target.value; };
  document.getElementById('del').onclick=()=>{ W.notes=W.notes.filter(x=>x!==nt); sel=null; render(); ed.innerHTML='<div class=hint>deleted.</div>'; };
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===================== add / drag / canvas events ===================== */
function addNode(g){ const n={id:uid('n'),label:'New Place',tier:'village',region:'',w:30,h:24,gx:g.gx,gy:g.gy,unlock:'',npcs:[],quests:[],items:[],buildings:[]}; W.nodes.push(n); selectNode(n); }
function addPath(a,b){ const p={id:uid('p'),a,b,via:'walk',gate:'',stage:'early',len:'',dots:[]}; W.paths.push(p); selectPath(p); }
function addNote(g){ const text=prompt('Note (Van’s suggestion / change):'); if(text==null)return; const nt={id:uid('n'),gx:g.gx,gy:g.gy,text}; W.notes.push(nt); selectNote(nt); render(); }
cv.addEventListener('mousedown',e=>{ const g=toGrid(e);
  if(mode==='node'){ addNode(g); }
  else if(mode==='note'){ addNote(g); }
  else if(mode==='zone'){ draftZone={x0:g.gx,y0:g.gy,x1:g.gx,y1:g.gy}; }
  else if(mode==='select'){ sel=null; ed.innerHTML='<div class=hint>nothing selected.</div>'; render(); }
});
window.addEventListener('mousemove',e=>{ if(drag){ const g=toGrid(e); const o=drag.t==='node'?drag.n:drag.t==='zone'?drag.z:drag.nt; o.gx=Math.round((drag.ox+(g.gx-drag.start.gx))*2)/2; o.gy=Math.round((drag.oy+(g.gy-drag.start.gy))*2)/2; render(); }
  else if(draftZone){ const g=toGrid(e); draftZone.x1=g.gx; draftZone.y1=g.gy; render(); } });
window.addEventListener('mouseup',e=>{ if(drag)drag=null;
  if(draftZone){ const z={id:uid('z'),kind:'terrain',label:'New Zone',gx:Math.min(draftZone.x0,draftZone.x1),gy:Math.min(draftZone.y0,draftZone.y1),gw:Math.abs(draftZone.x1-draftZone.x0)||2,gh:Math.abs(draftZone.y1-draftZone.y0)||2,color:ZONECOL.terrain,fade:true}; if(z.gw>0.3&&z.gh>0.3){W.zones.push(z);selectZone(z);} draftZone=null; render(); } });
window.addEventListener('keydown',e=>{ if((e.key==='Delete'||e.key==='Backspace')&&sel&&document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='INPUT'){ const c={node:()=>W.nodes=W.nodes.filter(x=>x.id!==sel.id),path:()=>W.paths=W.paths.filter(x=>x.id!==sel.id),zone:()=>W.zones=W.zones.filter(x=>x.id!==sel.id),note:()=>W.notes=W.notes.filter(x=>x.id!==sel.id)}[sel.t]; c&&c(); if(sel.t==='node')W.paths=W.paths.filter(p=>nodeById(p.a)&&nodeById(p.b)); sel=null; render(); } });

/* ===================== modes + toolbar + IO + layers ===================== */
function setMode(m){ mode=m; pathStart=null; ['select','node','path','zone','note'].forEach(x=>document.getElementById('m_'+x).classList.toggle('on',x===m));
  document.getElementById('hintbar').textContent={select:'Drag a node to move it (lines follow) · click to edit · Delete key removes',node:'Click the canvas to add a place',path:'Click node A then node B to link them',zone:'Drag a rectangle to make a zone',note:'Click anywhere to drop a note pin'}[m]; }
['select','node','path','zone','note'].forEach(m=>document.getElementById('m_'+m).onclick=()=>setMode(m));
document.getElementById('io_export').onclick=()=>{ const blob=new Blob([JSON.stringify(W,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(W.meta.name||'world').replace(/\W+/g,'-').toLowerCase()+'.world.json'; a.click(); };
document.getElementById('io_import').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=()=>{ try{ const j=JSON.parse(rd.result); if(!j.nodes)throw 0; W=j; W.zones=W.zones||[];W.notes=W.notes||[];W.meta=W.meta||{grid:24}; sel=null; render(); ed.innerHTML='<div class=hint>imported '+(W.meta.name||'world')+'.</div>'; }catch(err){ alert('Not a valid world JSON.'); } }; rd.readAsText(f); e.target.value=''; };
document.getElementById('io_new').onclick=()=>{ if(!confirm('Start a blank world? (export first to keep this one)'))return; W={meta:{name:'New World',grid:24,tileSize:32},nodes:[],paths:[],zones:[],notes:[]}; sel=null; render(); ed.innerHTML='<div class=hint>blank world. Add nodes with + Node.</div>'; };
function buildLayers(){ const L=document.getElementById('layers');
  const grp=(title,keys)=>`<h4>${title}</h4>${keys.map(([k,lab,c])=>`<label><input type=checkbox data-l="${k}" ${layers[k]?'checked':''}> <span style="color:${c||'#cdd8c4'}">${lab}</span></label>`).join('')}`;
  L.innerHTML=grp('Places (filter by tier)',TIERS.map(t=>[t,t,TIERCOL[t]]))
    +grp('Paths (progression stage)',[['early','early',STAGECOL.early],['mid','mid',STAGECOL.mid],['late','late',STAGECOL.late],['pathlabels','labels'],['gating','gate labels']])
    +grp('Zones',[['terrain','terrain',ZONECOL.terrain],['music','music',ZONECOL.music],['nogo','no-go',ZONECOL.nogo]])
    +grp('Overlays',[['quests','quests', '#9fe08a'],['items','items','#ffd36a'],['npcs','NPC counts'],['notes','notes','#ffe08a'],['grid','grid']]);
  L.querySelectorAll('[data-l]').forEach(c=>c.onchange=()=>{ layers[c.dataset.l]=c.checked; render(); });
}
buildLayers(); setMode('select'); render();
</script>
</body>
</html>
